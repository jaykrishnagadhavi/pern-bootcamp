<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form UI Exercise</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background-color: #f3f4f6;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-card {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 { 
            margin-bottom: 20px;
            color: #111827; 
        }

        /* 
           YOUR CHALLENGE:
           Write CSS below to style the form elements professionaly.
           1. Use Flexbox on the .form-group class to stack labels above inputs.
           2. Style the inputs/textareas to have a border, padding, and 100% width.
           3. Add a distinct :focus state to the inputs with a blue border outline.
           4. Style the submit button with a background color and a :hover state.
        */

        .form-group {
            /* Solve requirement 1 here */
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #374151;
        }

        /* Solve requirement 2, 3, and 4 below */
        input , 
        textarea {
            padding: 12px;
            border: 1px solid black;
            width: 100%;
        }

        input:focus,
        textarea:focus {
            border: 1px solid blue;
            outline: none;
        }

        button {
            background-color: #374151;
            color: white;
            padding: 12px;
        }
        button:hover {
            background-color: #1e2e49;
        }

    </style>
</head>
<body>

    <div class="form-card">
        <h2>Send a Message</h2>
        <form>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" rows="4" placeholder="How can I help you?"></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Inquiry</button>
        </form>
    </div>

</body>
</html>
